<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiRi 매크로 설정</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 24px 16px;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #555; text-transform: uppercase; letter-spacing: .04em; }
    label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #d2d2d7;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    input:focus { border-color: #0071e3; }
    .row { display: flex; gap: 8px; align-items: flex-end; margin-top: 12px; }
    .row input { flex: 1; }
    .target-name { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .section-label { font-size: 13px; color: #888; margin-bottom: 8px; margin-top: 16px; }
    .weekday-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .weekday-btn {
      padding: 8px 12px; border: 1.5px solid #d2d2d7; border-radius: 8px;
      font-size: 13px; cursor: pointer; background: #fff; user-select: none;
      transition: all .15s;
    }
    .weekday-btn.active { border-color: #0071e3; background: #0071e3; color: #fff; }
    .col-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .col-btn {
      padding: 8px 14px; border: 1.5px solid #d2d2d7; border-radius: 8px;
      font-size: 13px; cursor: pointer; background: #fff; user-select: none;
      transition: all .15s;
    }
    .col-btn.active { border-color: #34c759; background: #34c759; color: #fff; }
    .from-row-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
    .from-row-row label { margin: 0; font-size: 14px; color: #555; }
    .from-row-row input[type="number"] {
      width: 60px; padding: 8px 10px; border: 1px solid #d2d2d7;
      border-radius: 8px; font-size: 14px; text-align: center; outline: none;
    }
    .date-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .date-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #f5f5f7; border-radius: 8px; padding: 8px 12px; font-size: 14px;
    }
    .date-item button {
      border: none; background: none; color: #ff3b30; font-size: 16px;
      cursor: pointer; padding: 0 4px;
    }
    .date-add-row { display: flex; gap: 8px; margin-top: 8px; }
    .date-add-row input[type="date"] {
      flex: 1; padding: 9px 12px; border: 1px solid #d2d2d7;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    btn, button.btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn-primary { background: #0071e3; color: #fff; }
    .btn-primary:hover { opacity: .88; }
    .btn-secondary { background: #e8e8ed; color: #1d1d1f; }
    .btn-secondary:hover { opacity: .88; }
    .btn-small { padding: 8px 14px; font-size: 13px; }
    .btn-danger { background: #ff3b30; color: #fff; }
    .save-bar {
      position: sticky; bottom: 16px; background: #fff;
      border-radius: 12px; padding: 14px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      display: flex; justify-content: center;
    }
    .save-bar button { width: 100%; padding: 14px; font-size: 16px; }
    #status {
      font-size: 13px; text-align: center; margin-top: 12px;
      min-height: 20px; color: #555;
    }
    #status.ok { color: #34c759; }
    #status.err { color: #ff3b30; }
    .hidden { display: none !important; }
    #config-section { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>🚌 MiRi 매크로 설정</h1>

  <!-- GitHub 연결 -->
  <div class="card">
    <h2>GitHub 연결</h2>
    <label>저장소 (owner/repo)</label>
    <input type="text" id="repo" placeholder="예: username/miri-macro" />
    <label>Personal Access Token (PAT)</label>
    <input type="password" id="pat" placeholder="github_pat_..." />
    <p style="font-size:12px;color:#888;margin-top:6px;">
      PAT는 이 탭에서만 임시 보관됩니다. 탭을 닫으면 삭제됩니다.
    </p>
    <div style="margin-top:14px;">
      <button class="btn btn-primary" onclick="loadConfig()">불러오기</button>
    </div>
  </div>

  <!-- 설정 편집 영역 -->
  <div id="config-section">
    <div id="targets-container"></div>
    <div class="save-bar">
      <button class="btn btn-primary" onclick="saveConfig()">저장 (GitHub에 커밋)</button>
    </div>
  </div>

  <div id="status"></div>
</div>

<script>
  const DAYS = [
    { code: 'MON', label: '월' }, { code: 'TUE', label: '화' },
    { code: 'WED', label: '수' }, { code: 'THU', label: '목' },
    { code: 'FRI', label: '금' }, { code: 'SAT', label: '토' },
    { code: 'SUN', label: '일' },
  ];
  const COLS = [
    { no: 1, label: '좌창가' }, { no: 2, label: '좌통로' },
    { no: 3, label: '우통로' }, { no: 4, label: '우창가' },
  ];

  let configData = null;
  let fileSha = '';

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type;
  }

  function getGitHub() {
    const repo = document.getElementById('repo').value.trim();
    const pat = document.getElementById('pat').value.trim();
    sessionStorage.setItem('gh_repo', repo);
    sessionStorage.setItem('gh_pat', pat);
    return { repo, pat };
  }

  // 세션에 저장된 값 복원
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('repo').value = sessionStorage.getItem('gh_repo') || '';
    document.getElementById('pat').value = sessionStorage.getItem('gh_pat') || '';
  });

  async function loadConfig() {
    const { repo, pat } = getGitHub();
    if (!repo || !pat) { setStatus('저장소와 PAT를 입력해주세요.', 'err'); return; }
    setStatus('불러오는 중...');
    try {
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
        headers: { Authorization: `Bearer ${pat}`, Accept: 'application/vnd.github.v3+json' },
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
      const data = await res.json();
      fileSha = data.sha;
      const bytes = Uint8Array.from(atob(data.content.replace(/\n/g, '')), c => c.charCodeAt(0));
      configData = JSON.parse(new TextDecoder().decode(bytes));
      renderConfig();
      document.getElementById('config-section').style.display = 'block';
      setStatus('설정을 불러왔습니다.', 'ok');
    } catch (err) {
      setStatus(`오류: ${err.message}`, 'err');
    }
  }

  function renderConfig() {
    const container = document.getElementById('targets-container');
    container.innerHTML = '';
    configData.targets.forEach((target, ti) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="target-name">${target.name}</div>

        <div class="section-label">감시 요일</div>
        <div class="weekday-grid" id="weekdays-${ti}"></div>

        <div class="section-label">선호 좌석 위치</div>
        <div class="col-grid" id="cols-${ti}"></div>
        <div class="from-row-row">
          <label>시작 줄 이상:</label>
          <input type="number" id="fromRow-${ti}" min="1" max="20"
            value="${target.seatPreference?.fromRow ?? 3}" />
        </div>

        <div class="section-label">특정 날짜 지정 (선택 · 비워두면 요일만 적용)</div>
        <div class="date-list" id="dates-${ti}"></div>
        <div class="date-add-row">
          <input type="date" id="dateInput-${ti}" />
          <button class="btn btn-secondary btn-small" onclick="addDate(${ti})">+ 추가</button>
        </div>
      `;
      container.appendChild(card);

      // 요일 버튼 렌더
      const wdGrid = document.getElementById(`weekdays-${ti}`);
      DAYS.forEach(({ code, label }) => {
        const btn = document.createElement('button');
        btn.className = 'weekday-btn' + (target.weekdays?.includes(code) ? ' active' : '');
        btn.textContent = label;
        btn.dataset.code = code;
        btn.onclick = () => {
          btn.classList.toggle('active');
        };
        wdGrid.appendChild(btn);
      });

      // 열 선호 버튼 렌더
      const colGrid = document.getElementById(`cols-${ti}`);
      COLS.forEach(({ no, label }) => {
        const btn = document.createElement('button');
        btn.className =
          'col-btn' + (target.seatPreference?.preferredColumns?.includes(no) ? ' active' : '');
        btn.textContent = label;
        btn.dataset.col = no;
        btn.onclick = () => btn.classList.toggle('active');
        colGrid.appendChild(btn);
      });

      // 특정 날짜 렌더
      renderDates(ti, target.dates || []);
    });
  }

  function renderDates(ti, dates) {
    const list = document.getElementById(`dates-${ti}`);
    list.innerHTML = '';
    dates.forEach((d, di) => {
      const item = document.createElement('div');
      item.className = 'date-item';
      item.innerHTML = `<span>${d}</span><button onclick="removeDate(${ti}, ${di})">✕</button>`;
      list.appendChild(item);
    });
  }

  function addDate(ti) {
    const input = document.getElementById(`dateInput-${ti}`);
    const val = input.value;
    if (!val) return;
    const target = configData.targets[ti];
    if (!target.dates) target.dates = [];
    if (!target.dates.includes(val)) {
      target.dates.push(val);
      target.dates.sort();
    }
    input.value = '';
    renderDates(ti, target.dates);
  }

  function removeDate(ti, di) {
    configData.targets[ti].dates.splice(di, 1);
    renderDates(ti, configData.targets[ti].dates);
  }

  function collectConfig() {
    configData.targets.forEach((target, ti) => {
      // 요일
      const wdBtns = document.querySelectorAll(`#weekdays-${ti} .weekday-btn.active`);
      target.weekdays = Array.from(wdBtns).map((b) => b.dataset.code);

      // 선호 열
      const colBtns = document.querySelectorAll(`#cols-${ti} .col-btn.active`);
      if (!target.seatPreference) target.seatPreference = {};
      target.seatPreference.preferredColumns = Array.from(colBtns).map((b) => parseInt(b.dataset.col));
      target.seatPreference.fromRow = parseInt(document.getElementById(`fromRow-${ti}`).value) || 3;
    });
    return configData;
  }

  async function saveConfig() {
    const { repo, pat } = getGitHub();
    if (!repo || !pat) { setStatus('저장소와 PAT를 입력해주세요.', 'err'); return; }
    collectConfig();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(configData, null, 2) + '\n')));
    setStatus('저장 중...');
    try {
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/config.json`, {
        method: 'PUT',
        headers: {
          Authorization: `Bearer ${pat}`,
          Accept: 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          message: 'config: update via GitHub Pages UI',
          content,
          sha: fileSha,
        }),
      });
      if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
      const data = await res.json();
      fileSha = data.content.sha;
      setStatus('저장 완료! 다음 Actions 실행 시 반영됩니다.', 'ok');
    } catch (err) {
      setStatus(`저장 오류: ${err.message}`, 'err');
    }
  }
</script>
</body>
</html>
