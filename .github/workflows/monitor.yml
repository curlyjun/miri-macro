name: MiRi 좌석 모니터링 (5분마다)

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분마다
  workflow_dispatch:         # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: 좌석 모니터링 실행
        run: node index.js
        env:
          MODE: monitor
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          MIRI_MEMBER_UID: ${{ secrets.MIRI_MEMBER_UID }}
          MIRI_REFRESH_TOKEN: ${{ secrets.MIRI_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
